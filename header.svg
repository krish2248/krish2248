<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#080d15"/>
      <stop offset="100%" stop-color="#0c1628"/>
    </linearGradient>
    <linearGradient id="divGrad" x1="175" y1="0" x2="980" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3b82f6" stop-opacity="1"/>
      <stop offset="55%"  stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="28" x2="0" y2="252" gradientUnits="userSpaceOnUse">
